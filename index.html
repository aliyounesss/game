<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الكلمات Pro</title>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #a29bfe;
            --accent: #ff7675; 
            --bg: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            margin: 0; padding: 0; height: 100vh; color: white; overflow-x: hidden;
        }

        /* شاشة الدخول الفخمة */
        #login-overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; justify-content: center; align-items: center; z-index: 2000; 
        }
        .login-box { 
            background: white; padding: 40px 20px; border-radius: 30px; 
            width: 85%; max-width: 350px; text-align: center; color: #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* الحاوية الأساسية للموبايل */
        .app-container { 
            display: none; height: 100vh; flex-direction: column; 
            align-items: center; padding: 20px; box-sizing: border-box;
        }

        /* العداد (دائرة علوية) */
        .timer-circle {
            width: 100px; height: 100px; border: 4px solid var(--accent);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: bold; color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 118, 117, 0.3); margin-bottom: 10px;
        }

        /* الفئة (Category) */
        #category {
            background: rgba(255,255,255,0.1); padding: 10px 30px;
            border-radius: 50px; font-size: 1.4rem; border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 10px; backdrop-filter: blur(10px);
        }

        /* الحرف (Letter) - البطل في الشاشة */
        #letter {
            font-size: 10rem; font-weight: 900; color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 0; line-height: 1; transition: transform 0.3s ease;
        }

        /* منطقة الإدخال (Input) */
        .input-area {
            width: 100%; max-width: 400px; margin-top: auto; padding-bottom: 30px;
        }
        input {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            font-size: 1.5rem; text-align: center; outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); background: white;
        }

        /* زر الأدمن (TV) */
        .btn-tv-start {
            background: #00b894; color: white; padding: 20px 40px;
            border-radius: 20px; border: none; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; margin-bottom: 20px; width: 100%;
        }

        /* كروت النتائج */
        #results-area {
            width: 100%; max-width: 500px; margin-top: 20px;
        }
        .player-card {
            background: var(--card-bg); color: #333; padding: 15px;
            border-radius: 20px; margin-bottom: 15px; position: relative;
            border-right: 8px solid var(--primary);
        }
        .word-tag {
            display: inline-block; background: #eee; padding: 5px 12px;
            border-radius: 10px; margin: 3px; font-size: 0.9rem; font-weight: bold;
        }
        .del-word { color: var(--accent); margin-right: 8px; font-weight: bold; cursor: pointer; }
        .score-badge {
            position: absolute; left: 15px; top: 15px; background: var(--primary);
            color: white; padding: 2px 10px; border-radius: 10px; font-weight: bold;
        }

        /* وضع التلفزيون (TV Mode) */
        body.tv-mode #letter { font-size: 20rem; }
        body.tv-mode #category { font-size: 4rem; }
        body.tv-mode #results-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 100%; }
    </style>
</head>
<body>

<audio id="snd-ding" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3"></audio>
<audio id="snd-end" src="https://assets.mixkit.co/active_storage/sfx/1017/1017-preview.mp3"></audio>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--primary)">سهرة الحروف 🎲</h2>
        <input type="text" id="nameInput" placeholder="اسمك  اكتب )">
        <button onclick="entry()" style="margin-top:20px; width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">دخول</button>
    </div>
</div>

<div class="app-container" id="mainGame">
    <button class="btn-tv-start" id="startBtn" onclick="tvStart()" style="display:none">ابدأ الجولة 🚀</button>
    
    <div class="timer-circle" id="timer">60</div>
    <div id="category">انتظر...</div>
    <div id="letter">؟</div>

    <div class="input-area" id="inputContainer">
        <input type="text" id="wordInput" placeholder="اكتب الكلمة هنا..." disabled>
        <p id="liveCounter" style="text-align:center; margin-top:10px; font-weight:bold;"></p>
    </div>

    <div id="results-area" style="display:none">
        <h2 style="text-align:center; font-size: 2rem;">🏆 النتائج</h2>
        <div id="playersContainer"></div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBWUxatxOaLjNtlCIrGjxAzJ6EjO86hpz0",
    authDomain: "aliyouness-162e0.firebaseapp.com",
    databaseURL: "https://aliyouness-162e0-default-rtdb.firebaseio.com",
    projectId: "aliyouness-162e0",
    storageBucket: "aliyouness-162e0.firebasestorage.app",
    messagingSenderId: "912085898718",
    appId: "1:912085898718:web:5aa127e764f78fc1f2394f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const gameRef = ref(db, 'gameState');
  const resultsRef = ref(db, 'roundResults');

  let myName = "";
  let isTV = false;
  let currentLetter = "";
  let myWords = [];
  let timerInterval;

  window.entry = function() {
    const name = document.getElementById('nameInput').value.trim();
    if(!name) return;
    if(name.toUpperCase() === "TV") {
        isTV = true;
        document.body.classList.add('tv-mode');
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('inputContainer').style.display = 'none';
    }
    myName = name;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('mainGame').style.display = 'flex';
  }

  window.tvStart = () => {
    const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    const categories = ["نبات", "حيوان", "جماد", "بلاد", "أكلة", "مهنة", "ماركة", "بالمطبخ"];
    remove(resultsRef).then(() => {
        set(gameRef, { 
            letter: letters[Math.floor(Math.random() * letters.length)], 
            category: categories[Math.floor(Math.random() * categories.length)], 
            status: 'playing', startTime: Date.now() 
        });
    });
  }

  onValue(gameRef, (snapshot) => {
    const data = snapshot.val();
    if (data && data.status === 'playing' && (Date.now() - data.startTime < 5000)) {
        currentLetter = data.letter;
        myWords = [];
        document.getElementById('letter').innerText = data.letter;
        document.getElementById('category').innerText = data.category;
        document.getElementById('results-area').style.display = 'none';
        document.getElementById('liveCounter').innerText = "";
        if(!isTV) { document.getElementById('wordInput').disabled = false; document.getElementById('wordInput').focus(); }
        startTimer();
    }
  });

  function startTimer() {
    let timeLeft = 60;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 10 && timeLeft > 0) document.getElementById('snd-tick').play();
        if(timeLeft <= 0) { clearInterval(timerInterval); finish(); }
    }, 1000);
  }

  document.getElementById('wordInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
        const w = e.target.value.trim();
        if (w.startsWith(currentLetter) && !myWords.includes(w)) {
            myWords.push(w);
            document.getElementById('snd-ding').play();
            document.getElementById('liveCounter').innerText = "سجلت " + myWords.length + " كلمات";
            e.target.value = "";
        }
    }
  };

  function finish() {
    document.getElementById('snd-end').play();
    document.getElementById('wordInput').disabled = true;
    if(!isTV) push(resultsRef, { name: myName, words: myWords });
  }

  onValue(resultsRef, (snapshot) => {
    const results = snapshot.val();
    if (results) {
        document.getElementById('results-area').style.display = 'block';
        const container = document.getElementById('playersContainer');
        container.innerHTML = "";
        Object.entries(results).forEach(([key, player]) => {
            let wordsHTML = (player.words || []).map((w, index) => `
                <span class="word-tag">${w}${isTV ? `<span class="del-word" onclick="removeWord('${key}', ${index})">✕</span>` : ''}</span>
            `).join('');
            container.innerHTML += `
                <div class="player-card">
                    <span class="score-badge">${(player.words || []).length}</span>
                    <strong>👤 ${player.name}</strong>
                    <div style="margin-top:10px">${wordsHTML}</div>
                </div>`;
        });
    }
  });

  window.removeWord = (pKey, wIdx) => {
      if(!isTV) return;
      const pRef = ref(db, `roundResults/${pKey}/words`);
      onValue(pRef, (snap) => {
          let words = snap.val();
          if(words && words[wIdx]) {
              words.splice(wIdx, 1);
              set(pRef, words);
          }
      }, { onlyOnce: true });
  }
</script>
</body>
</html>
